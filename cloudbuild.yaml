steps:
  # 1. Build and push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cygnus-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cygnus-backend']

  # 2. Deploy Backend to Cloud Run to get the URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy cygnus-backend \
          --image gcr.io/$PROJECT_ID/cygnus-backend \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "GEMINI_API_KEY=sm://projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest" && \
        gcloud run services describe cygnus-backend --region us-central1 --format 'value(status.url)' > /workspace/backend_url.txt

  # 3. Build Frontend with the Backend URL and API Key
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg REACT_APP_BACKEND_URL=$$BACKEND_URL \
          --build-arg REACT_APP_GEMINI_API_KEY=$${GEMINI_API_KEY} \
          -t gcr.io/$PROJECT_ID/cygnus-frontend ./frontend
    secretEnv: ['GEMINI_API_KEY']

  # 4. Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cygnus-frontend']

  # 5. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cygnus-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cygnus-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/cygnus-backend'
  - 'gcr.io/$PROJECT_ID/cygnus-frontend'
