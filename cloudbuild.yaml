steps:
  # 1. Build and push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cygnus-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cygnus-backend']

  # 2. Deploy Backend to Cloud Run and capture its URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy cygnus-backend \
          --image gcr.io/$PROJECT_ID/cygnus-backend \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --update-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" && \
        gcloud run services describe cygnus-backend --region us-central1 --format 'value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"

  # 3. Build the App (Vite + Express) with secrets injected as build args
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg GEMINI_API_KEY=$${GEMINI_API_KEY} \
          --build-arg VITE_BACKEND_URL=$$BACKEND_URL \
          -t gcr.io/$PROJECT_ID/cygnus-app ./app
    secretEnv: ['GEMINI_API_KEY']

  # 4. Push App image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cygnus-app']

  # 5. Deploy App to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy cygnus-app \
          --image gcr.io/$PROJECT_ID/cygnus-app \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "GCP_BACKEND_URL=$$BACKEND_URL" \
          --update-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/cygnus-backend'
  - 'gcr.io/$PROJECT_ID/cygnus-app'
